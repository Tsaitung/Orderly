version: '3.8'

# Dev overlay on top of compose.base.yml: exposes Postgres/Redis on host ports
# and provides optional admin tools (pgAdmin / redis-commander).
#
# Backend runs as a modular monolith — use compose.monolith.yml
# (`npm run dev:backend`) to build/run the backend image. The old per-service
# build contexts (./backend/<svc>-fastapi) were removed when the backend was
# re-rooted into backend/app/modules/, so they no longer live here.

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:?run direnv allow at repo root}:5432"

  redis:
    ports:
      - "${REDIS_PORT:?run direnv allow at repo root}:6379"

  # Admin tools (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@orderly.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      # SSOT 沒有 admin tool 槽位 — 用 BACKEND_PORT+57 derive 避免跨 project 撞
      # (orderly: 8543 → 8600, helloglow: 8432 → 8489)
      - "${PGADMIN_PORT:-8600}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orderly-network
    profiles:
      - admin

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      # SSOT 沒有 admin tool 槽位 — derive from BACKEND_PORT+58
      - "${REDIS_COMMANDER_PORT:-8601}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - orderly-network
    profiles:
      - admin

volumes:
  pgadmin_data:
