# Orderly Service Manifest
# Centralized service configuration for CI/CD pipeline
# Defines service dependencies, build triggers, and deployment order

version: "1.0"
metadata:
  description: "Orderly monolith dependency and build configuration"
  last_updated: "2026-06-07"

# Service definitions with dependencies
services:
  backend-monolith:
    path: backend/app
    depends_on: []
    cloud_build: backend/cloudbuild.monolith.yaml
    dockerfile: backend/Dockerfile.monolith
    health_check: /health
    db_health_check: /db/health
    port: 8080
    deploy_order: 1
    triggers:
      - backend/app/**
      - backend/libs/orderly_fastapi_core/**
      - shared/types/**

# Infrastructure dependencies that trigger full deployment
infrastructure:
  triggers:
    - .github/workflows/**
    - infrastructure/**
    - docker-compose*.yml
    - scripts/deploy*.sh
    - scripts/iam/**
    - ci/**

# Frontend configuration
frontend:
  path: .
  cloud_build: frontend/cloudbuild.yaml
  health_check: /
  port: 8080
  triggers:
    - app/**
    - components/**
    - frontend/**
    - lib/**
    - public/**
    - styles/**
    - package.json
    - package-lock.json
    - next.config.js
    - tsconfig.json
    - tailwind.config.js
    - postcss.config.js
    - Dockerfile.frontend

# Deployment environments
environments:
  staging:
    suffix: "-staging"
    service_suffix: ""
    min_instances: 0
    max_instances: 10
    memory: "512Mi"
    cpu: "1"
    
  staging-v2:
    suffix: "-staging"
    service_suffix: "-v2"
    min_instances: 0
    max_instances: 10
    memory: "512Mi"
    cpu: "1"
    
  production:
    suffix: ""
    service_suffix: ""
    min_instances: 1
    max_instances: 20
    memory: "1Gi"
    cpu: "2"

# Build optimization rules
optimization:
  # Backend modules now build and deploy as one monolith image.
  build_groups:
    - [backend-monolith]
  special_handling:
    backend-monolith:
      - ensure_cloud_sql
      - check_redis_connectivity
      
  # Maximum parallel builds
  max_parallel_builds: 8
  
  # Cache settings
  docker_cache:
    enabled: true
    ttl_hours: 168  # 1 week

# Validation rules
validation:
  required_secrets:
    - GCP_SA_KEY
    - GCP_PROJECT_ID
    - POSTGRES_PASSWORD
    - JWT_SECRET
    - JWT_REFRESH_SECRET
    
  required_apis:
    - run.googleapis.com
    - cloudbuild.googleapis.com
    - artifactregistry.googleapis.com
    - secretmanager.googleapis.com
    - compute.googleapis.com
    - vpcaccess.googleapis.com
    - redis.googleapis.com
