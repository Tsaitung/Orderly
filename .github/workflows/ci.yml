name: CI

# CI = the quality gate. No cloud, no deploy. Fast-fail, cached, sharded.
# Triggered standalone on PRs/pushes AND consumed by cd.yml via workflow_call
# so that CD only ever runs after CI is green.

on:
  pull_request:
    branches: [staging, develop, main]
  push:
    # Deploy branches (staging/main) run CI via cd.yml's gate (workflow_call),
    # so only non-deploy branch pushes need a standalone CI run here.
    branches: [develop]
  workflow_call:
    inputs:
      shards:
        description: 'Number of frontend Jest shards'
        type: string
        default: '4'

# Cancel superseded CI runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
            frontend:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'contexts/**'
              - 'hooks/**'
              - 'stores/**'
              - 'public/**'
              - 'middleware.ts'
              - 'next.config.js'
              - 'tailwind.config.ts'
              - 'tsconfig*.json'
              - 'package.json'
              - 'package-lock.json'

  frontend-quality:
    name: Frontend Lint + Typecheck + Format
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
      - name: Install deps
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript (tsc --noEmit, not a full build)
        run: npm run type-check
      - name: Prettier check
        run: npm run format:check

  frontend-test:
    name: Frontend Jest (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    strategy:
      fail-fast: false
      matrix:
        # To change shard count, edit this list AND the /N denominator in the Jest step.
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
      - name: Install deps
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - name: Restore Jest cache
        uses: actions/cache@v4
        with:
          path: .jest-cache
          key: jest-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Jest (sharded)
        run: npx jest --ci --shard=${{ matrix.shard }}/4 --cacheDirectory=.jest-cache --passWithNoTests --maxWorkers=2

  backend-test:
    name: Backend Monolith
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    # Backend is now a single modular monolith (backend/app). The old 9-service
    # matrix tested per-service dirs whose app/ was re-rooted into
    # backend/app/modules/* (the dirs were deleted), so it only ever reported
    # `ModuleNotFoundError: No module named 'app'`. This validates the monolith:
    # deps install + alembic upgrade head on a fresh CI DB. Advisory until the
    # monolith ships its own pytest suite.
    continue-on-error: true
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: orderly
          POSTGRES_PASSWORD: orderly_test
          POSTGRES_DB: orderly
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: orderly
      DATABASE_NAME: orderly
      POSTGRES_PASSWORD: orderly_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: test_jwt_secret_for_ci_only
      JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
      # Monolith: `app` package lives at backend/app, so its parent (backend) is
      # on PYTHONPATH; shared core (orderly_fastapi_core) lives in backend/libs.
      PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/backend/libs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/app/requirements.txt
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-asyncio pytest-xdist httpx
      - name: Alembic upgrade head (monolith chain on fresh CI DB)
        working-directory: backend
        run: alembic -c app/alembic.ini upgrade head
      - name: Pytest (monolith, if any tests exist)
        working-directory: backend
        run: |
          if find app -path '*/tests/*' -name 'test_*.py' | grep -q .; then
            python -m pytest -q -n auto app
          else
            echo "No monolith tests yet, skipping"
          fi

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-quality, frontend-test, backend-test]
    if: always()
    steps:
      - name: Aggregate results (skipped = OK, failed/cancelled = block)
        run: |
          # backend-test is ADVISORY (continue-on-error) and reported, not gated.
          echo "backend-test (advisory) = ${{ needs.backend-test.result }}"
          fail=0
          for r in \
            "frontend-quality:${{ needs.frontend-quality.result }}" \
            "frontend-test:${{ needs.frontend-test.result }}"; do
            name="${r%%:*}"; res="${r##*:}"
            echo "$name = $res"
            case "$res" in
              success|skipped) : ;;
              *) echo "::error::$name did not pass ($res)"; fail=1 ;;
            esac
          done
          exit $fail
