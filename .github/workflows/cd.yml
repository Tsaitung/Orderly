name: CD

# CD = build + deploy, gated on CI. Triggered on pushes to deploy branches.
# Key optimizations vs the retired deploy workflow:
#   - Single CI gate (reusable ci.yml) instead of CI/CD racing unguarded.
#   - build + deploy MERGED per service (no cross-job image-poll loop).
#   - Images built in-runner with BuildKit registry layer cache (deps cached
#     => ~100s cold / ~15s warm instead of full Cloud Build every time).
#   - Consolidated validate/routing jobs (less repeated checkout+auth tax).
#   - Smoke tolerates 401 on auth-gated routes (401 == service healthy).

on:
  push:
    # PRODUCTION AUTO-DEPLOY DISABLED (2026-06-08): the prod DB (orderly-db Cloud
    # SQL) is not provisioned, so every push to main hit the preflight gate's
    # "orderly-db not found" → red with ZERO deploy. `main` is removed from the
    # auto-deploy push triggers until production is actually set up. To deploy
    # prod, run this workflow manually via workflow_dispatch (and only after
    # orderly-db exists). Staging (push to `staging` branch → orderly-db-v2) is
    # unaffected. Re-add `main` here when prod infra is ready.
    branches: [staging]
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated services to deploy (empty = changed only)'
        required: false
        type: string
      force_all:
        description: 'Deploy all backend services + frontend'
        required: false
        default: false
        type: boolean

concurrency:
  # Serialize deploys per branch; do NOT cancel an in-flight deploy.
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID || 'orderly-472413' }}
  GOOGLE_CLOUD_REGION: asia-east1
  REGISTRY: asia-east1-docker.pkg.dev
  AR_REPO: orderly

jobs:
  # ---- Gate: CD never runs unless CI is green -------------------------------
  gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ---- Resolve env + changed services (pure shell, no auth) -----------------
  resolve:
    name: Resolve Deploy Context
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      suffix: ${{ steps.ctx.outputs.suffix }}
      db_instance: ${{ steps.ctx.outputs.db_instance }}
      services: ${{ steps.ctx.outputs.services }}
      frontend: ${{ steps.ctx.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Resolve deploy context (env + suffix + db + changed services)
        id: ctx
        # Logic lives in scripts/ci/resolve-deploy-context.sh (SSOT) so it is
        # unit-tested by resolve-deploy-context.test.sh (run in `make deploy-check`),
        # not only exercised here. Keep this step a thin caller.
        env:
          REF: ${{ github.ref }}
          INPUT_SERVICES: ${{ github.event.inputs.services }}
          INPUT_FORCE_ALL: ${{ github.event.inputs.force_all }}
        run: bash scripts/ci/resolve-deploy-context.sh | tee -a "$GITHUB_OUTPUT"

  # ---- Preflight: read-only DB safety gate (orphan audit + schema diff) ------
  # CD-PREFLIGHT-ORPHAN-GATE + GUARD-MONOLITH-AWARE + SCHEMA-DRIFT-DIFF (prep).
  # Runs BEFORE any migration/deploy. Read-only: it never writes to the DB.
  #   1. Deploy-config drift guard (no auth needed): Dockerfile.monolith COPY
  #      sources still exist in the build context.
  #   2. Orphan audit: scripts/database/monolith_fk_audit.sql against the resolved
  #      target DB. FAIL the deploy if SUM(orphan_count) > 0 — the 7 cross-module
  #      FKs that 0002/0003 enforce would otherwise abort the migration on real
  #      orphans. Staging targets orderly-db-v2; prod targets orderly-db (which
  #      does NOT exist yet — owner-gated infra, deploy is OUT OF SCOPE here).
  #   3. alembic_version_monolith assertion: absent on first run, else at head.
  #   4. Schema-drift diff (prep, read-only): pg_dump --schema-only of the live
  #      DB captured as an artifact for human review vs unified_metadata. We do
  #      NOT auto-resolve drift (owner decision: create_all(checkfirst=True)
  #      silently skips existing tables and never reconciles drift).
  # Requires GitHub environment approval (production reviewer) before it proceeds.
  preflight:
    name: Preflight DB Safety Gate
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.services != '[]'
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy-config drift guard (monolith COPY sources)
        run: bash scripts/ci/check-deploy-consistency.sh

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install Cloud SQL Auth Proxy + psql client
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          curl -sSL -o /tmp/cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.11.0/cloud-sql-proxy.linux.amd64
          chmod +x /tmp/cloud-sql-proxy

      - name: Read-only orphan audit + schema-drift snapshot
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          DB_INSTANCE: ${{ needs.resolve.outputs.db_instance }}
        run: |
          set -euo pipefail

          # The prod DB instance (orderly-db) is owner-gated infra and may not
          # exist. Fail LOUD (not silently) if the resolved instance is missing,
          # so a deploy can never proceed without a real preflight oracle.
          if ! DB_CONN=$(gcloud sql instances describe "$DB_INSTANCE" \
              --format="value(connectionName)" --project="$GOOGLE_CLOUD_PROJECT" 2>/tmp/sql_describe.err); then
            echo "::error::Preflight: SQL instance '$DB_INSTANCE' not found — cannot run the orphan audit oracle."
            echo "  ($ENVIRONMENT path). Resolve the DB instance before deploying; do NOT skip the gate."
            cat /tmp/sql_describe.err || true
            exit 1
          fi

          PG_PASS=$(gcloud secrets versions access latest \
            --secret=postgres-password --project="$GOOGLE_CLOUD_PROJECT")

          /tmp/cloud-sql-proxy --port 5432 "$DB_CONN" &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 20); do
            if PGPASSWORD="$PG_PASS" psql -h 127.0.0.1 -p 5432 -U orderly -d orderly \
                 -c 'SELECT 1' >/dev/null 2>&1; then break; fi
            echo "waiting for proxy ($i/20)"; sleep 2
          done

          export PGPASSWORD="$PG_PASS"
          PSQL="psql -h 127.0.0.1 -p 5432 -U orderly -d orderly -v ON_ERROR_STOP=1"

          # (3) alembic_version_monolith assertion (first-run absence / re-deploy).
          #     AVM is the load-bearing first-run signal: when the monolith has
          #     never migrated this DB, alembic_version_monolith does not exist yet,
          #     and NONE of the 7 monolith FK tables (orders/order_items/products/
          #     supplier_skus/acceptances/organizations/product_skus) exist either —
          #     the `migrate` job (which runs AFTER this gate) is what creates them.
          AVM=$($PSQL -tA -c "SELECT to_regclass('public.alembic_version_monolith') IS NOT NULL;")
          echo "alembic_version_monolith present: $AVM"

          # (2) Orphan audit — fail if any of the 7 cross-module FK checks > 0.
          #     Belt: gate on AVM. On first run (AVM=f) the monolith schema does not
          #     exist yet, so there are 0 orphans BY CONSTRUCTION (migrate creates
          #     empty tables); skip the audit with a clear log line instead of
          #     pretending to oracle a schema that isn't there.
          #     Suspenders: monolith_fk_audit.sql is ALSO defensive (to_regclass
          #     absence guard => missing table yields 0), so even if this gate
          #     regressed, the audit would not error under ON_ERROR_STOP=1.
          if [ "$AVM" != "t" ]; then
            echo "preflight: alembic_version_monolith absent -> first run, no monolith tables yet, orphan audit skipped (migrate will create empty tables = 0 orphans by construction)"
            : > /tmp/orphan_audit.txt
          else
            echo "::group::Orphan audit (monolith_fk_audit.sql)"
            $PSQL -f scripts/database/monolith_fk_audit.sql | tee /tmp/orphan_audit.txt
            echo "::endgroup::"
            TOTAL=$($PSQL -tA -f scripts/database/monolith_fk_audit.sql \
              | awk -F'|' 'NF>=2 {s+=$2} END {print s+0}')
            echo "Total orphan rows across 7 FK checks: $TOTAL"
            if [ "${TOTAL:-0}" -gt 0 ]; then
              echo "::error::Preflight orphan audit FAILED: $TOTAL orphan rows would abort the 0002/0003 FK migration. Owner must remediate (backfill / archive / approved cleanup) — do NOT auto-delete or auto-NULL."
              exit 1
            fi
          fi

          # (4) Schema-drift snapshot (read-only) for human review vs unified_metadata.
          pg_dump -h 127.0.0.1 -p 5432 -U orderly -d orderly \
            --schema-only --no-owner --no-privileges > /tmp/live_schema.sql || true
          echo "Captured live schema snapshot ($(wc -l < /tmp/live_schema.sql) lines) for drift review."

      - name: Upload schema-drift + audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-${{ needs.resolve.outputs.environment }}
          path: |
            /tmp/orphan_audit.txt
            /tmp/live_schema.sql
          if-no-files-found: warn

  # ---- Migrate: gated, decoupled `alembic upgrade head` (CD-DECOUPLE-MIGRATION)
  # Runs the monolith migration as a SEPARATE step BEFORE the serving deploy,
  # using the SAME image (built by build-deploy is not yet available, so build the
  # migration image here from the same Dockerfile and run alembic via the same
  # entrypoint). A migration abort is now observable/retryable and never crash-loops
  # the serving revision. Gated behind preflight (orphan audit = 0) AND the
  # production environment reviewer approval.
  migrate:
    name: DB Migration (decoupled, gated)
    runs-on: ubuntu-latest
    needs: [resolve, preflight]
    if: needs.resolve.outputs.services != '[]'
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - uses: docker/setup-buildx-action@v3

      - name: Build + push migration image (same Dockerfile.monolith)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.monolith
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-backend-monolith:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-backend-monolith:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-backend-monolith:buildcache,mode=max

      - name: Run alembic upgrade head via Cloud Run Job (same image)
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          DB_INSTANCE: ${{ needs.resolve.outputs.db_instance }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          DB_CONN=$(gcloud sql instances describe "$DB_INSTANCE" \
            --format="value(connectionName)" --project="$GOOGLE_CLOUD_PROJECT")
          JOB="orderly-monolith-migrate-$ENVIRONMENT"
          IMAGE="$REGISTRY/$GOOGLE_CLOUD_PROJECT/$AR_REPO/orderly-backend-monolith:$IMAGE_TAG"

          # The serving CMD is just uvicorn; override it to run alembic only.
          gcloud run jobs deploy "$JOB" \
            --image="$IMAGE" \
            --region="$GOOGLE_CLOUD_REGION" \
            --project="$GOOGLE_CLOUD_PROJECT" \
            --service-account="orderly-migration@$GOOGLE_CLOUD_PROJECT.iam.gserviceaccount.com" \
            --set-env-vars="ENVIRONMENT=$ENVIRONMENT,NODE_ENV=$ENVIRONMENT,DATABASE_HOST=/cloudsql/$DB_CONN,DATABASE_PORT=5432,DATABASE_NAME=orderly,DATABASE_USER=orderly" \
            --set-secrets="POSTGRES_PASSWORD=postgres-password:latest" \
            --set-cloudsql-instances="$DB_CONN" \
            --command="sh" \
            --args="-c,alembic -c app/alembic.ini upgrade head" \
            --max-retries=0 --task-timeout=30m --parallelism=1

          echo "Executing migration job (blocks until done)…"
          gcloud run jobs execute "$JOB" \
            --region="$GOOGLE_CLOUD_REGION" --project="$GOOGLE_CLOUD_PROJECT" --wait

  # ---- Build (cached) + deploy, merged per service --------------------------
  build-deploy:
    name: Build+Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [resolve, preflight, migrate]
    if: needs.resolve.outputs.services != '[]'
    environment: ${{ needs.resolve.outputs.environment }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service: ${{ fromJson(needs.resolve.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - uses: docker/setup-buildx-action@v3

      - name: Build + push (BuildKit registry cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.monolith
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-${{ matrix.service }}:buildcache,mode=max

      - name: Deploy to Cloud Run
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          SUFFIX: ${{ needs.resolve.outputs.suffix }}
          DB_INSTANCE: ${{ needs.resolve.outputs.db_instance }}
          SERVICE: ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          source scripts/ci/cloud-run-names.sh
          SERVICE_NAME=$(cr_service_name "$SERVICE" "$ENVIRONMENT" "$SUFFIX")

          DB_CONN=$(gcloud sql instances describe "$DB_INSTANCE" \
            --format="value(connectionName)" --project="$GOOGLE_CLOUD_PROJECT")
          REDIS_HOST=$(gcloud redis instances describe orderly-cache \
            --region="$GOOGLE_CLOUD_REGION" --format="value(host)" \
            --project="$GOOGLE_CLOUD_PROJECT" 2>/dev/null || echo "")

          if [ "$ENVIRONMENT" = "production" ]; then
            MEM=1Gi; CPU=2; MINI=1; MAXI=20; CONC=80
          else
            MEM=512Mi; CPU=1; MINI=0; MAXI=10; CONC=100
          fi

          ENV_VARS="ENVIRONMENT=$ENVIRONMENT,NODE_ENV=$ENVIRONMENT,DATABASE_HOST=/cloudsql/$DB_CONN,DATABASE_PORT=5432,DATABASE_NAME=orderly,DATABASE_USER=orderly"
          [ -n "$REDIS_HOST" ] && ENV_VARS="$ENV_VARS,REDIS_HOST=$REDIS_HOST,REDIS_PORT=6379"

          gcloud run deploy "$SERVICE_NAME" \
            --image="$REGISTRY/$GOOGLE_CLOUD_PROJECT/$AR_REPO/orderly-$SERVICE:$IMAGE_TAG" \
            --platform=managed --region="$GOOGLE_CLOUD_REGION" \
            --allow-unauthenticated \
            --memory="$MEM" --cpu="$CPU" \
            --min-instances="$MINI" --max-instances="$MAXI" --concurrency="$CONC" \
            --timeout=300 \
            --set-env-vars="$ENV_VARS" \
            --set-secrets="POSTGRES_PASSWORD=postgres-password:latest,JWT_SECRET=jwt-secret:latest,JWT_REFRESH_SECRET=jwt-refresh-secret:latest" \
            --add-cloudsql-instances="$DB_CONN" \
            --project="$GOOGLE_CLOUD_PROJECT" \
            --labels="environment=$ENVIRONMENT,service=$SERVICE,git_sha=$IMAGE_TAG"

      - name: Wait for health (poll, no fixed sleep)
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          SUFFIX: ${{ needs.resolve.outputs.suffix }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          source scripts/ci/cloud-run-names.sh
          SERVICE_NAME=$(cr_service_name "$SERVICE" "$ENVIRONMENT" "$SUFFIX")
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$GOOGLE_CLOUD_REGION" --format="value(status.url)" \
            --project="$GOOGLE_CLOUD_PROJECT")
          for i in $(seq 1 20); do
            if curl -sf "$URL/health" --max-time 5 >/dev/null; then
              echo "✅ $SERVICE healthy"; exit 0
            fi
            echo "⏳ waiting for $SERVICE health ($i/20)"; sleep 3
          done
          echo "::error::$SERVICE did not become healthy"; exit 1

  # ---- Resolve monolith URL (one job, one auth) -----------------------------
  wire-up:
    name: Resolve Backend Routing
    runs-on: ubuntu-latest
    needs: [resolve, build-deploy]
    if: always() && needs.build-deploy.result == 'success'
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Resolve backend monolith URL
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          SUFFIX: ${{ needs.resolve.outputs.suffix }}
        run: |
          set -euo pipefail
          source scripts/ci/cloud-run-names.sh
          be=$(cr_service_name "backend-monolith" "$ENVIRONMENT" "$SUFFIX")
          gcloud run services describe "$be" --region="$GOOGLE_CLOUD_REGION" \
            --format="value(status.url)" --project="$GOOGLE_CLOUD_PROJECT"

  # ---- Frontend (cached build) ----------------------------------------------
  deploy-frontend:
    name: Build+Deploy Frontend
    runs-on: ubuntu-latest
    # CD-FRONTEND-GATE: gate on build-deploy success. The frontend repoints
    # ORDERLY_BACKEND_URL/BACKEND_URL/NEXT_PUBLIC_API_BASE_URL to the monolith
    # URL; if it runs in parallel and the backend never boots/migrates, the
    # frontend serves user-facing 5xx. Wait for a healthy backend revision first.
    # build-deploy is SKIPPED on a frontend-only deploy (services == '[]') — allow
    # that. But when there IS a backend to deploy (services != '[]'), proceed ONLY
    # if build-deploy actually SUCCEEDED. Otherwise a backend preflight failure
    # leaves build-deploy 'skipped' (which is != 'failure'), and the old gate would
    # still ship the frontend pointing at a backend URL that never came up.
    # 2026-06-08 incident: merge to main → prod preflight failed (no orderly-db) →
    # backend skipped → a broken orderly-frontend-production deployed with empty
    # BACKEND_URL. This gate prevents the frontend from going live without a backend.
    needs: [resolve, build-deploy]
    if: >-
      always()
      && needs.resolve.outputs.frontend == 'true'
      && (needs.resolve.outputs.services == '[]' || needs.build-deploy.result == 'success')
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}
      - uses: docker/setup-buildx-action@v3
      - name: Resolve backend URL
        id: be
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          SUFFIX: ${{ needs.resolve.outputs.suffix }}
        run: |
          set -euo pipefail
          source scripts/ci/cloud-run-names.sh
          be=$(cr_service_name "backend-monolith" "$ENVIRONMENT" "$SUFFIX")
          url=$(gcloud run services describe "$be" --region="$GOOGLE_CLOUD_REGION" \
            --format="value(status.url)" --project="$GOOGLE_CLOUD_PROJECT" 2>/dev/null || echo "")
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Build + push frontend (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.be.outputs.url }}/api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-frontend:${{ needs.resolve.outputs.environment }}-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.GOOGLE_CLOUD_PROJECT }}/${{ env.AR_REPO }}/orderly-frontend:buildcache,mode=max
      - name: Deploy frontend
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          SUFFIX: ${{ needs.resolve.outputs.suffix }}
          BACKEND_URL: ${{ steps.be.outputs.url }}
        run: |
          set -euo pipefail
          gcloud run deploy "orderly-frontend-$ENVIRONMENT$SUFFIX" \
            --image="$REGISTRY/$GOOGLE_CLOUD_PROJECT/$AR_REPO/orderly-frontend:$ENVIRONMENT-${{ github.sha }}" \
            --platform=managed --region="$GOOGLE_CLOUD_REGION" --allow-unauthenticated \
            --memory=1Gi --cpu=1 --min-instances=0 --max-instances=10 --concurrency=100 --port=8080 \
            --set-env-vars="NODE_ENV=$ENVIRONMENT,ORDERLY_BACKEND_URL=$BACKEND_URL,BACKEND_URL=$BACKEND_URL,NEXT_PUBLIC_API_BASE_URL=$BACKEND_URL/api" \
            --project="$GOOGLE_CLOUD_PROJECT" \
            --labels="environment=$ENVIRONMENT,git_sha=${{ github.sha }}"

  # ---- Smoke: 5xx/connection only; 401 on auth routes == healthy ------------
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: [resolve, build-deploy, wire-up, deploy-frontend]
    # Smoke only when a deploy ACTUALLY happened: no upstream deploy failed AND
    # at least one of build-deploy / deploy-frontend succeeded. Without the
    # success requirement, a no-op run (resolve -> services=[] + frontend=false,
    # e.g. a docs-only push) leaves all deploy jobs 'skipped' (!= 'failure'),
    # so smoke would run against nothing and falsely go red.
    if: >-
      always()
      && needs.build-deploy.result != 'failure'
      && needs.wire-up.result != 'failure'
      && needs.deploy-frontend.result != 'failure'
      && (needs.build-deploy.result == 'success' || needs.deploy-frontend.result == 'success')
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Smoke check (backend monolith /health)
        env:
          ENVIRONMENT: ${{ needs.resolve.outputs.environment }}
          SUFFIX: ${{ needs.resolve.outputs.suffix }}
        run: |
          set -euo pipefail
          source scripts/ci/cloud-run-names.sh
          fail=0
          for s in backend-monolith; do
            n=$(cr_service_name "$s" "$ENVIRONMENT" "$SUFFIX")
            u=$(gcloud run services describe "$n" --region="$GOOGLE_CLOUD_REGION" \
              --format="value(status.url)" --project="$GOOGLE_CLOUD_PROJECT" 2>/dev/null || echo "")
            if [ -z "$u" ]; then echo "::error::$s has no URL"; fail=1; continue; fi
            code=$(curl -s -o /dev/null -w '%{http_code}' "$u/health" --max-time 15 || echo 000)
            echo "$s /health -> $code"
            # Healthy = 2xx. 401/403 are NOT probed here (those are auth-gated app routes,
            # not liveness): a 401 means the service is up and correctly enforcing auth.
            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              echo "::error::$s /health unhealthy ($code)"; fail=1
            fi
          done
          exit $fail
